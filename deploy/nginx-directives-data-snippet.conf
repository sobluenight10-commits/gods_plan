# Merge this `location` block into the `server { ... }` for your site in
# /etc/nginx/sites-enabled/default (or your vhost), then:
#   sudo nginx -t && sudo systemctl reload nginx
#
# Serves JSON written by Minerva (e.g. data/directives.json) at /data/...

location /data/ {
    alias /root/gods_plan/data/;
    add_header Access-Control-Allow-Origin *;
}
